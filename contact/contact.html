<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Fieldtone Studio</title>

<meta name="description" content="Start a project with Fieldtone. Cinematic architectural visualization inquiries.">

<link rel="icon" type="image/jpeg" href="assets/img/FIELDTONE_Favicon_Colored_BG.jpg">

<!-- Global CSS (cursor, scrollbar, fade, etc.) -->
<link rel="stylesheet" href="/assets/css/style.css">

<!-- Page CSS -->
<link rel="stylesheet" href="contact.css">
</head>

<body class="contact-page">

<!-- Global Cursor -->
<div class="cursor-dot"></div>
<div class="cursor-ring"></div>

<header class="contact-nav">
    <a href="/" class="logo">
        <img src="/assets/img/FIELDTONE_Primary_Colored_Logo_Black_BG.png" alt="Fieldtone">
    </a>
    <nav>
        <a href="../archvizography/archvizography.html">Archvizography</a>
        <a href="../ethos/ethos.html">Ethos</a>
        <a href="/contact/" class="active">Contact</a>
    </nav>
</header>

<section class="contact-hero">
    <h1>Start a Project</h1>
    <p>Tell us about your vision. We’ll direct the rest.</p>
</section>

<section class="contact-form-section">

<form class="contact-form"
      action="https://formspree.io/f/xykdlvoy"
      method="POST">

    <!-- Redirect after successful submit -->
    <input type="hidden" name="_redirect" value="https://fieldtone-studio.com/contact/thank-you.html">

    <!-- Optional subject line in inbox -->
    <input type="hidden" name="_subject" value="New Fieldtone Project Inquiry">

    <div class="field">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" required>
    </div>

    <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
    </div>

    <div class="field">
        <label for="company">Company / Studio</label>
        <input type="text" id="company" name="company">
    </div>

    <div class="field">
        <label for="project_type">Project Type</label>
        <select id="project_type" name="project_type" required>
            <option value="" disabled selected>Select project type</option>
            <option value="Residential">Residential</option>
            <option value="Commercial">Commercial</option>
            <option value="Urban / Masterplan">Urban / Masterplan</option>
            <option value="Interior">Interior</option>
            <option value="Other">Other</option>
        </select>
    </div>

    <div class="field">
        <label for="timeline">Estimated Timeline</label>
        <input type="text" id="timeline" name="timeline" placeholder="e.g. 6–8 weeks">
    </div>

    <div class="field full">
        <label for="description">Project Description</label>
        <textarea id="description" name="description" rows="6" required></textarea>
    </div>

    <button type="submit" class="submit-btn">
        Submit Inquiry
    </button>

</form>

</section>

<footer class="contact-footer">
    <img src="/assets/img/FIELDTONE_Primary_White_Logo.png" alt="Fieldtone">
    <p>Cinematic visuals that move hearts — and move properties.</p>
</footer>

<!-- Global JS (cursor + fade + menu logic) -->
<script src="/assets/js/main.js"></script>

</body>

</html>
