<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Fieldtone Studio</title>

<meta name="description" content="Start a project with Fieldtone. Cinematic architectural visualization inquiries.">

<link rel="icon" href=/assets/img/FIELDTONE_Favicon_Colored_BG.jpg>

<!-- Global CSS (cursor, scrollbar, fade, etc.) -->
<link rel="stylesheet" href="/assets/css/style.css">

<!-- Page CSS -->
<link rel="stylesheet" href="contact.css">
</head>

<body class="contact-page">

<!-- Global Cursor -->
<div class="cursor-dot"></div>
<div class="cursor-ring"></div>

<header class="contact-nav">
    <a href="/" class="logo">
        <img src="/assets/img/FIELDTONE_Primary_Colored_Logo_Black_BG.png" alt="Fieldtone">
    </a>
    <nav>
        <a href="../archvizography/archvizography.html">Archvizography</a>
        <a href="../ethos/ethos.html">Ethos</a>
        <a href="/contact/" class="active">Contact</a>
    </nav>
</header>

<section class="contact-hero">
    <h1>Start a Project</h1>
    <p>Tell us about your vision. We’ll direct the rest.</p>
</section>

<section class="contact-form-section">

<form class="contact-form">

    <div class="field">
        <label>Your Name</label>
        <input type="text" required>
    </div>

    <div class="field">
        <label>Email Address</label>
        <input type="email" required>
    </div>

    <div class="field">
        <label>Company / Studio</label>
        <input type="text">
    </div>

    <div class="field">
        <label>Project Type</label>
        <select>
            <option>Residential</option>
            <option>Commercial</option>
            <option>Urban / Masterplan</option>
            <option>Interior</option>
            <option>Other</option>
        </select>
    </div>

    <div class="field">
        <label>Estimated Timeline</label>
        <input type="text" placeholder="e.g. 6–8 weeks">
    </div>

    <div class="field full">
        <label>Project Description</label>
        <textarea rows="6" required></textarea>
    </div>

    <button type="submit" class="submit-btn">
        Submit Inquiry
    </button>

</form>

</section>

<footer class="contact-footer">
    <img src="/assets/img/FIELDTONE_Primary_White_Logo.png" alt="Fieldtone">
    <p>Cinematic visuals that move hearts — and move properties.</p>
</footer>

<!-- Global JS (cursor + fade + menu logic) -->
<script src="/assets/js/main.js"></script>

<!-- Page JS -->
<script src="contact.js"></script>

</body>

</html>
