<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archvizography · Fieldtone Studio</title>

<meta name="description" content="Archvizography — a Fieldtone discipline blending architecture and cinema into one emotional language.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<!-- Global styles first -->
<link rel="stylesheet" href="/assets/css/style.css">

<!-- Page-specific styles second -->
<link rel="stylesheet" href="archvizography.css">
</head>

<body class="archvizography-page loading">

<!-- ================= CUSTOM CURSOR ================= -->
<div class="cursor-dot"></div>
<div class="cursor-ring"></div>

<!-- ================= LOADER ================= -->

<div id="avzLoader" class="loader">

    <div class="curtain curtain-top"></div>
    <div class="curtain curtain-bottom"></div>

    <div class="clapper-stage">

        <img class="clap-body"
             src="loader/clapper-body.svg"
             alt="Clapper Body">

        <img class="clap-hinge"
             src="loader/clapper-hinge.svg"
             alt="Clapper Hinge">

        <div class="clap-top-wrapper">
            <img class="clap-top"
                 src="loader/clapper-top.svg"
                 alt="Clapper Top">
        </div>

        <img class="wordmark"
             src="loader/archvizography-textmark.png"
             alt="Archvizography">

        <div class="impact-flash"></div>
        <div class="dust-burst"></div>

    </div>

</div>

<!-- ================= HEADER ================= -->

<header class="avz-header">
    <nav>
        <a href="/">Home</a>
        <a href="#" class="active">Archvizography</a>
        <a href="/#contact">Contact</a>
    </nav>
</header>

<!-- ================= HERO ================= -->

<section class="hero">

    <picture>
        <!-- Mobile image -->
        <source 
            srcset="loader/hero-archvizography-mobile.webp"
            media="(max-width: 768px)"
            type="image/webp">

        <!-- Desktop fallback -->
        <img 
            src="loader/hero-archvizography.webp" 
            alt="Archvizography hero"
            class="hero-bg">
    </picture>

    <div class="hero-overlay">
        <p class="eyebrow">Archvizography</p>
        <h1>We don’t render buildings.<br>We direct stories.</h1>
        <p class="sub">
            Architecture as cinema. Light as narrative. Space as emotion.
        </p>
    </div>

</section>

<!-- ================= FOOTER ================= -->

<footer class="footer">
    © <span id="year"></span> Fieldtone Studio
</footer>

<!-- ================= PAGE SCRIPT ================= -->

<script>
document.getElementById("year").textContent = new Date().getFullYear();

window.addEventListener("load", () => {
    const loader = document.getElementById("avzLoader");

    loader.classList.add("play");

    setTimeout(() => {
        loader.classList.add("exit");
        document.body.classList.remove("loading");
    }, 2600);
});
</script>

</body>
</html>
