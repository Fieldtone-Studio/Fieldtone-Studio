<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fieldtone Studio | Archvizography</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="assets/img/FIELDTONE_Favicon_Colored_BG.jpg">

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- ================= LOADER ================= -->
    <div id="loader">
        <img 
            src="assets/img/FIELDTONE_Primary_Colored_Logo_Black_BG.png" 
            alt="Fieldtone Studio"
            class="loader-logo"
        >
    </div>

    <!-- ================= MAIN CONTENT ================= -->
    <main id="main-content">

        <!-- CAM 1 (Loads Immediately) -->
        <section class="render-section">
            <img 
                src="Renders/The_Fiordland_Ascent/CAM1_The_Reflective_Approach.jpg"
                alt="The Reflective Approach"
                class="render-image"
            >
        </section>

        <!-- CAM 2 -->
        <section class="render-section">
            <img 
                src="Renders/The_Fiordland_Ascent/CAM2_TheCliffSide_Ascent.jpg"
                loading="lazy"
                alt="The Cliff Side Ascent"
                class="render-image"
            >
        </section>

        <!-- CAM 3 -->
        <section class="render-section">
            <img 
                src="Renders/The_Fiordland_Ascent/CAM3_The_Skybridge_Arrival.jpg"
                loading="lazy"
                alt="The Skybridge Arrival"
                class="render-image"
            >
        </section>

        <!-- CAM 4 -->
        <section class="render-section">
            <img 
                src="Renders/The_Fiordland_Ascent/CAM4_The_Rain_Passage.jpg"
                loading="lazy"
                alt="The Rain Passage"
                class="render-image"
            >
        </section>

        <!-- CAM 5 -->
        <section class="render-section">
            <img 
                src="Renders/The_Fiordland_Ascent/CAM5_The_Summit_Veranda.jpg"
                loading="lazy"
                alt="The Summit Veranda"
                class="render-image"
            >
        </section>

        <!-- CAM 6 -->
        <section class="render-section">
            <img 
                src="Renders/The_Fiordland_Ascent/CAM6_The_Garden_Overlook.jpg"
                loading="lazy"
                alt="The Garden Overlook"
                class="render-image"
            >
        </section>

        <!-- CAM 7 -->
        <section class="render-section">
            <img 
                src="Renders/The_Fiordland_Ascent/CAM7_The_Suspended_Curve.jpg"
                loading="lazy"
                alt="The Suspended Curve"
                class="render-image"
            >
        </section>

        <!-- CAM 8 -->
        <section class="render-section">
            <img 
                src="Renders/The_Fiordland_Ascent/CAM8_The_Fjordside_Outlook.jpg"
                loading="lazy"
                alt="The Fjordside Outlook"
                class="render-image"
            >
        </section>

    </main>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>

</body>
</html>
