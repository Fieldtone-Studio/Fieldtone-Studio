<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fieldtone Studio | Archvizography</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/jpeg" href="assets/img/FIELDTONE_Favicon_Colored_BG.jpg">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- ================= CUSTOM CURSOR ================= -->
<div class="cursor-dot"></div>
<div class="cursor-ring"></div>

<!-- ================= LOADER ================= -->
<div id="loader">
    <div class="loader-inner">
        <img 
            src="assets/img/FIELDTONE_Textmark_White.png"
            alt="Fieldtone Studio"
            class="loader-text"
        >
        <div class="loader-accent"></div>
    </div>
</div>

<!-- ================= NAVBAR ================= -->
<header class="navbar">
    <a href="/" class="logo">
        <img src="assets/img/FIELDTONE_Primary_Colored_Logo_Black_BG.png" alt="Fieldtone Studio">
    </a>

    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
    </div>
</header>

<!-- ================= SLIDE MENU ================= -->
<div class="menu-overlay" id="menu">
    <nav class="menu-links">
        <a href="#">Work</a>
        <a href="#">Archvizography</a>
        <a href="#">Ethos</a>
        <a href="#">Clients</a>
        <a href="#contact">Contact</a>
    </nav>
</div>

<!-- ================= MAIN CONTENT ================= -->
<main id="main-content">

    <!-- ================= HERO ================= -->
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>
                We create visuals<br>
                that move hearts<br>
                and move properties
            </h1>
        </div>
    </section>

    <!-- ================= FEATURED ================= -->
    <section class="featured">
        <h2>Featured Projects</h2>

        <div class="project-grid">
            <div class="project-card">
                <img src="Renders/The_Fiordland_Ascent/CAM1_The_Reflective_Approach.jpg" alt="The Fiordland Ascent">
                <div class="project-title">The Fiordland Ascent</div>
            </div>

            <div class="project-card placeholder">
                <div class="project-title">Coming Soon</div>
            </div>

            <div class="project-card placeholder">
                <div class="project-title">Coming Soon</div>
            </div>
        </div>
    </section>

    <!-- ================= FOOTER ================= -->
    <footer id="contact" class="footer">

    <img src="assets/img/FIELDTONE_Textmark_White.png" alt="Fieldtone Studio">

    <div class="footer-links">
        <a href="#">
            <img src="contacts/instagram.svg" alt="Instagram">
        </a>

        <a href="#">
            <img src="contacts/vimeo.svg" alt="Vimeo">
        </a>

        <a href="#">
            <img src="contacts/linkedin.svg" alt="LinkedIn">
        </a>

        <a href="#">
            <img src="contacts/facebook.svg" alt="Facebook">
        </a>

        <a href="mailto:info@fieldtone-studio.com">
            <img src="contacts/email.svg" alt="Email">
        </a>
    </div>

</footer>

</main>

<script src="assets/js/main.js"></script>
</body>
</html>
